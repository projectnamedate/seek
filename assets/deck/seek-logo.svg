<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <!-- Primary gradient: cyan to light teal -->
    <linearGradient id="seekGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#61afbd"/>
      <stop offset="50%" stop-color="#95d2e6"/>
      <stop offset="100%" stop-color="#cfe6e4"/>
    </linearGradient>
    <!-- Subtle glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.38
                0 0 0 0 0.69
                0 0 0 0 0.74
                0 0 0 0.3 0" result="glowColor"/>
      <feMerge>
        <feMergeNode in="glowColor"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- SEEK wordmark — bold geometric sans -->
  <text
    x="400" y="195"
    font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="160"
    font-weight="800"
    letter-spacing="24"
    text-anchor="middle"
    fill="url(#seekGrad)"
    filter="url(#glow)"
  >SEEK</text>
</svg>