<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="seekGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#61afbd"/>
      <stop offset="50%" stop-color="#95d2e6"/>
      <stop offset="100%" stop-color="#cfe6e4"/>
    </linearGradient>
    <linearGradient id="subtitleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#99b3be"/>
      <stop offset="100%" stop-color="#cfe6e4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.38
                0 0 0 0 0.69
                0 0 0 0 0.74
                0 0 0 0.5 0" result="glowColor"/>
      <feMerge>
        <feMergeNode in="glowColor"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="800" height="400" fill="#010101" rx="16"/>

  <!-- SEEK wordmark -->
  <text
    x="400" y="220"
    font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="160"
    font-weight="800"
    letter-spacing="24"
    text-anchor="middle"
    fill="url(#seekGrad)"
    filter="url(#glow)"
  >SEEK</text>

  <!-- Tagline -->
  <text
    x="400" y="280"
    font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="400"
    letter-spacing="8"
    text-anchor="middle"
    fill="url(#subtitleGrad)"
  >SCAVENGER HUNTS ON SOLANA</text>
</svg>